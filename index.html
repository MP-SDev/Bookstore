<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DA Bookstore</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
</head>
<body onload="renderBookOverview(); setLocalStorageCommentsFromDB(); setLocalStorageLikedFromDB(); renderUsername()">
    <header>
        <div class="headerContainer content">
            <div class="headerLogoContainer">
                <img src="./assets/img/clker-free-vector-images-book-306468.svg" alt="Logo DA bookstore">
                <h1 class="redText">DA</h1><h1>Bookstore</h1> 
                <p>- get your book here</p>
            </div>
            <div class="headerUserContainer">
                <p id="shownUsername"></p>
                <button onclick="openUsernameDialog()">Sign in with your name</button>
            </div>
        </div>
    </header>
    <main>
        <div class="content" id="bookArticlesContainer">

        </div>
        <dialog id="usernameDialog">
            <form>
                <label for="usernameInput">Username:</label>
                <input type="text" name="usernameInput" id="usernameInput">
                <button onclick="changeUsername()">Submit</button>
            </form>
        </dialog>
    </main>
</body>
</html>
